version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: foodio-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: foodio
    ports:
      - '5432:5432'
    volumes:
      - foodio-db-data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: foodio-backend
    restart: always
    ports:
      - '3000:3000'
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: foodio
      DB_SYNCHRONIZE: 'false'
      JWT_SECRET: supersecret-change-me-in-production
      ADMIN_EMAIL: admin@foodio.com
      ADMIN_PASSWORD: admin123
      SEED_INITIAL_DATA: 'false'
      PORT: 3000
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    container_name: foodio-frontend
    restart: always
    ports:
      - '3001:3001'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
      PORT: 3001
    depends_on:
      - backend

volumes:
  foodio-db-data:
